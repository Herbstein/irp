syntax = "proto3";

package irp;

service IRP {
  rpc FooBar(stream FooBarRequest) returns (stream FooBarResponse);
}

message Handshake {
  uint32 custid = 1;
  uint64 subsessionid = 2;
}

message CarTelemetry {
  float lapPct = 1;
}

message Telemetry {
  repeated CarTelemetry cars = 1;
}

message CarSummary {
  float laptime = 1;
}

message LapSummary {
  repeated CarSummary summaries = 1;
}

message FooBarRequest {
  oneof msg {
    Handshake handshake = 1;
    Telemetry telemetry = 2;
    LapSummary summary = 3;
  }
}

message HandshakeAck {}

message FooBarResponse {
  oneof msg {
    HandshakeAck handshakeAck = 1;
  }
}
